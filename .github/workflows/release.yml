name: Auto Tag & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract latest version from CHANGELOG.md
        id: version
        run: |
          # CHANGELOG.md から最新の ## [x.y.z] を抽出
          VERSION=$(grep -oP '(?<=^## \[)\d+\.\d+\.\d+' CHANGELOG.md | head -1)
          if [ -z "$VERSION" ]; then
            echo "No version found in CHANGELOG.md"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        if: steps.version.outputs.skip != 'true'
        id: check_tag
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG does not exist. Will create."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog for this version
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # 該当バージョンのセクションだけ抽出（次の ## [ まで）
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | head -n -1)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tag
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        run: |
          TAG=${{ steps.version.outputs.tag }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true' && steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
